name: release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.version.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
      envoy_version: ${{ steps.version.outputs.envoy_version }}
    steps:
      - uses: actions/checkout@v7
      - id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '\n' < VERSION)"
          envoy_version="$(tr -d '\n' < ENVOY_VERSION)"
          if [[ "$version" == *-dev ]]; then
            echo "VERSION is a dev marker; skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "envoy_version=$envoy_version" >> "$GITHUB_OUTPUT"

  release:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
      - uses: Swatinem/rust-cache@v2
      - name: Ensure release tag does not exist
        shell: bash
        env:
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          set -euo pipefail
          tag="v${VERSION}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists locally"
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists on origin"
            exit 1
          fi
      - run: cargo build --workspace --release --locked
      - run: cargo test --workspace --release --locked
      - run: cargo xtask check-regen
      - name: Create and push release tag
        shell: bash
        env:
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          set -euo pipefail
          tag="v${VERSION}"
          git tag "$tag"
          git push origin "$tag"
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check.outputs.version }}
          name: envoy-proto v${{ needs.check.outputs.version }}
          generate_release_notes: true
          body: |
            Generated from Envoy API version `${{ needs.check.outputs.envoy_version }}`.
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p envoy-proto --token "$CARGO_REGISTRY_TOKEN"
